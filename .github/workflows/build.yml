jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Prepare builds folder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $GITHUB_WORKSPACE/builds
          cd $GITHUB_WORKSPACE/builds
          git init
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          
          if git fetch origin builds --depth=1; then
            git checkout builds
          else
            echo "Branch 'builds' not found. Seeding initial environment..."
            git checkout --orphan builds
            git rm -rf . || true
            echo "Initial Build Sync Placeholder" > .init_seed
          fi

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew make makePluginsJson --no-build-cache --rerun-tasks
          
          echo "==== Deep Scanning Workspace for Artifacts ===="
          # Automatically hunts down any plugins.json and copies it to staging
          find . -name "plugins.json" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          
          # Automatically hunts down all compiled extensions (.cs3 files) and copies them
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;
          
          echo "Listing copied builds content:"
          ls -la $GITHUB_WORKSPACE/builds/

      - name: Push builds
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd $GITHUB_WORKSPACE/builds
          
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          
          git add -A
          git commit -m "Build update: $GITHUB_SHA" --allow-empty
          git push origin builds --force
